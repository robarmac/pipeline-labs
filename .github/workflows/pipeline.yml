name: "Estrutura de Diretórios e Arquivos"

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "18"

Jobs:
  demonstrando-estrutura:
    name: "Demonstrar Estrutura Básica"
    runs-on: ubuntu-latest

    steps:
     - name: Checkout do Código
       uses: actions/Checkout@v4

     - name: Mostrar estrutura .github/workflow_dispatch
       run: |
        echo " == ESTRUTURA DE DIRETORIOS E ARQUIVOS .github/workflows == "
        ls -la .github/workflows
        echo ""
        echo " Total de workflows: $(ls -l .github/workflows | wc -l) "
     - name: Elementos obrigatórios do workflows
       run: |
        echo " == ELEMENTOS OBRIGATÓRIOS == "
        echo " 1. name: Nome do workflow "
        echo " 2. on: Evento que dispara o workflow "
        echo " 3. jobs: Definição dos trabalhos a serem executados "
        echo " 4. runs-on: Ambiente onde o job será executado "
        echo ""
        echo " Total de elementos obrigatórios: 5 "

     - name: Variáveis e Contexto
       run: |
        echo " == VARIÁVEIS E CONTEXTO == "
        echo " Variáveis env: ${ env.NODE_VERSION } "
        echo " 1. env: Definição de variáveis de ambiente "
        echo " 2. contextos: Acesso a informaç~es do workflow, job, runner, etc. "
        echo ""
        echo " Total de variáveis e contextos: 2 "
